name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  linux:
    name: Linux / Neovim ${{ matrix.neovim }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        neovim:
          - v0.12.0
          - stable

    steps:
      - uses: actions/checkout@v4

      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim }}

      - name: Show Neovim version
        run: nvim --version

      - name: Run smoke suite
        run: ./scripts/smoke.sh
